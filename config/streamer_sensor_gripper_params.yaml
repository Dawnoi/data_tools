/**:
  ros__parameters:
    server:
      host: "127.0.0.1"
      port: 8007

    inference:
      freq: 20.0
      n_obs_steps: 2
      camera_freq: 30.0
      jpeg_quality: 85
      auto_reset: true

    safety:
      enabled: true
      max_position_delta: 0.05
      max_gripper_delta: 0.3
      position_x_min: 0.0
      position_x_max: 0.8
      position_y_min: -0.6
      position_y_max: 0.6
      position_z_min: -0.2
      position_z_max: 0.7
      publish_rate_hz: 20.0
      log_rejections: true

    camera:
      color:
        width: 1280
        height: 720
        topics: ['/sensor/camera_l/color/image_raw', '/sensor/camera_r/color/image_raw', '/sensor/camera_fisheye_l/color/image_raw', '/sensor/camera_fisheye_r/color/image_raw', '/gripper/camera_l/color/image_raw', '/gripper/camera_r/color/image_raw', '/gripper/camera_fisheye_l/color/image_raw', '/gripper/camera_fisheye_r/color/image_raw']
        names: ['sensorCamera_l', 'sensorCamera_r', 'sensorFisheye_l', 'sensorFisheye_r', 'gripperCamera_l', 'gripperCamera_r', 'gripperFisheye_l', 'gripperFisheye_r']

    arm:
      endPose:
        topics: ['/nero_FK_l/urdf_end_pose_orient', '/nero_FK_r/urdf_end_pose_orient']
        names: ['arm_l', 'arm_r']
        orient: [true, true]
        offset: [0.0, 0.0]
      active_arms: "arm_l,arm_r"
      active_arm_gripper_names: "arm_l:gripper_l,arm_r:gripper_r"

    gripper:
      encoder:
        topics: ['/sensor/gripper_l/data', '/sensor/gripper_r/data', '/gripper/gripper_l/data', '/gripper/gripper_r/data']
        names: ['sensor_l', 'sensor_r', 'gripper_l', 'gripper_r']
