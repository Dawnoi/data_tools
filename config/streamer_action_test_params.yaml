/**:
  ros__parameters:
    server:
      host: "192.168.100.27"
      port: 8007

    inference:
      freq: 20.0
      n_obs_steps: 2
      camera_freq: 30.0
      jpeg_quality: 85
      auto_reset: true

    debug:
      enabled: true
      dir: "/home/yxgn/data_streamer_debug"
      # RGB相机
      camera_names: "gripperCamera_l"
      # 鱼眼相机
      # camera_names: "gripperFisheye_l"
      arm_names: "arm_l,arm_r"
      gripper_names: "gripper_l,gripper_r"

    action:
      enabled: true
      arm_index: 0
      # topic must match arm_pose_inference_executor subscription: /nero_inference{index_name}/action
      # index_name='_l' (left arm) -> /nero_inference_l/action
      # index_name='_r' (right arm) -> /nero_inference_r/action
      topic: "/nero_inference_l/action"

    save_action:
      enabled: true
      dir: "/home/yxgn/action_save"

    safety:
      enabled: true
      max_position_delta: 0.3
      max_gripper_delta: 0.3  # gripper delta check removed from code; kept for future use
      max_angle_delta: 1.57
      position_x_min: 0.0
      position_x_max: 0.8
      position_y_min: -0.6
      position_y_max: 0.6
      position_z_min: -0.2
      position_z_max: 0.7
      publish_rate_hz: 20.0
      log_rejections: true

    camera:
      color:
        width: 1280
        height: 720
        # RGB相机
        topics: ['/camera_l/color/image_raw', '/camera_r/color/image_raw']
        names: ['gripperCamera_l', 'gripperCamera_r']
        # 鱼眼相机
        # topics: ['/camera_fisheye_l/color/image_raw', '/camera_fisheye_r/color/image_raw']
        # names: ['gripperFisheye_l', 'gripperFisheye_r']

    arm:
      endPose:
        topics: ['/nero_FK_l/urdf_end_pose_orient', '/nero_FK_r/urdf_end_pose_orient']
        names: ['arm_l', 'arm_r']
        orient: [true, true]
        offset: [0.0, 0.0]
      # 双臂 RGB相机
      # active_arms: "arm_l,arm_r"
      # active_arm_gripper_names: "arm_l:gripper_l,arm_r:gripper_r"
      # active_arm_camera_names: "arm_l:gripperCamera_l,arm_r:gripperCamera_r"
      # per_arm_cameras: "arm_l:gripperCamera_l,arm_r:gripperCamera_r"
      # 双臂 鱼眼相机
      # active_arms: "arm_l,arm_r"
      # active_arm_gripper_names: "arm_l:gripper_l,arm_r:gripper_r"
      # active_arm_camera_names: "arm_l:gripperFisheye_l,arm_r:gripperFisheye_r"
      # per_arm_cameras: "arm_l:gripperFisheye_l,arm_r:gripperFisheye_r"
      # 右臂单独采集 RGB相机
      # active_arms: "arm_r"
      # active_arm_gripper_names: "arm_r:gripper_r"
      # active_arm_camera_names: "arm_r:gripperCamera_r"
      # per_arm_cameras: "arm_r:gripperCamera_r"
      # 右臂单独采集 鱼眼相机
      # active_arms: "arm_r"
      # active_arm_gripper_names: "arm_r:gripper_r"
      # active_arm_camera_names: "arm_r:gripperFisheye_r"
      # per_arm_cameras: "arm_r:gripperFisheye_r"
      # 左臂单独采集 RGB相机
      # active_arms: "arm_l"
      # active_arm_gripper_names: "arm_l:gripper_l"
      # active_arm_camera_names: "arm_l:gripperCamera_l"
      # per_arm_cameras: "arm_l:gripperCamera_l"
      # 左臂单独采集 鱼眼相机
      # active_arms: "arm_l"
      # active_arm_gripper_names: "arm_l:gripper_l"
      # active_arm_camera_names: "arm_l:gripperFisheye_l"
      # per_arm_cameras: "arm_l:gripperFisheye_l"
      active_arms: "arm_l"
      active_arm_gripper_names: "arm_l:gripper_l"
      active_arm_camera_names: "arm_l:gripperCamera_l"
      per_arm_cameras: "arm_l:gripperCamera_l"
      # Remote sensor poses (teleop master device)
      remote_pose:
        topics: ['/pika_pose_r', '/pika_pose_l']
        names: ['arm_r', 'arm_l']

    gripper:
      encoder:
        topics: ['/gripper_l/data', '/gripper_r/data']
        names: ['gripper_l', 'gripper_r']
