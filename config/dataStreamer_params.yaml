/**:
  ros__parameters:
    server:
      host: "127.0.0.1"
      port: 8007

    inference:
      freq: 20.0
      n_obs_steps: 2
      camera_freq: 30.0
      jpeg_quality: 85
      auto_reset: true

    debug:
      enabled: true
      dir: "/home/yxgn/data_streamer_debug"
      camera_names: "gripperFisheye_l,gripperFisheye_r"
      arm_names: "arm_l,arm_r"
      gripper_names: "gripper_l,gripper_r"

    action:
      enabled: true
      arm_index: 0
    
    safety:
      enabled: true
      max_position_delta: 0.05
      max_gripper_delta: 0.3
      position_x_min: 0.0
      position_x_max: 0.8
      position_y_min: -0.6
      position_y_max: 0.6
      position_z_min: -0.2
      position_z_max: 0.7
      publish_rate_hz: 20.0
      log_rejections: true

    camera:
      color:
        width: 1280
        height: 720
        topics: ['/gripper/camera_fisheye_l/color/image_raw', '/gripper/camera_fisheye_r/color/image_raw']
        names: ['gripperFisheye_l', 'gripperFisheye_r']

    arm:
      endPose:
        topics: ['/nero_FK_l/urdf_end_pose_orient', '/nero_FK_r/urdf_end_pose_orient']
        names: ['arm_l', 'arm_r']
        orient: [true, true]
        offset: [0.0, 0.0]
      # 双臂   
      # active_arms: "arm_l,arm_r"
      # active_arm_gripper_names: "arm_l:gripper_l,arm_r:gripper_r"
      # active_arm_camera_names: "arm_l:gripperFisheye_l,arm_r:gripperFisheye_r"
      # per_arm_cameras: "arm_l:gripperFisheye_l,arm_r:gripperFisheye_r"
      # 右臂单独采集
      active_arms: "arm_r"
      active_arm_gripper_names: "arm_r:gripper_r"
      active_arm_camera_names: "arm_r:gripperFisheye_r"
      per_arm_cameras: "arm_r:gripperFisheye_r"
      # 左臂单独采集
      # active_arms: "arm_l"
      # active_arm_gripper_names: "arm_l:gripper_l"
      # active_arm_camera_names: "arm_l:gripperFisheye_l"
      # per_arm_cameras: "arm_l:gripperFisheye_l"

    gripper:
      encoder:
        topics: ['/sensor/gripper_l/data', '/sensor/gripper_r/data', '/gripper/gripper_l/data', '/gripper/gripper_r/data']
        names: ['sensor_l', 'sensor_r', 'gripper_l', 'gripper_r']
